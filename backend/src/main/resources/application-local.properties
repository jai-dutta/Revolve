# Local development profile — uses H2 in-memory database, no env vars needed
spring.datasource.url=jdbc:h2:mem:revolvedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# H2 console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Dev-only JWT secret (64 bytes, base64-encoded) — do NOT use in production
app.jwt.secret=jONKs+agUP+a32fApXbXCQORdBXJvH/ZHQ2PFiwqTCNuN8asYog7y38PXNxwBaY4m1XlaD4Y7Swg/GpGeQlYvw==
app.jwt.expirationMs=86400000
